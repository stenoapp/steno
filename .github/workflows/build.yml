name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# audiopus_sys-vendored libopus has an old CMakeLists.txt
# (cmake_minimum_required(VERSION 2.x)); newer CMake (4.x on macos-latest)
# refuses it without this policy override. Safe no-op on platforms with
# older cmake (Linux / Windows runners).
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned: macos-latest's default Xcode lacked Metal 3 SDK symbols
          # (MTLSamplerReductionMode) needed by apple-metal 0.8.5's Swift
          # bridge — a transitive dep of screencapturekit. macos-14 ships
          # Xcode 15+ which covers it.
          - { os: macos-14, name: macOS }
          - { os: ubuntu-22.04, name: Linux }
          - { os: windows-latest, name: Windows }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libasound2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (debug, no bundle)
        run: pnpm tauri build --debug --no-bundle
