name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# audiopus_sys-vendored libopus has an old CMakeLists.txt
# (cmake_minimum_required(VERSION 2.x)); newer CMake (4.x on macos-latest)
# refuses it without this policy override. Safe no-op on platforms with
# older cmake (Linux / Windows runners).
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # apple-metal 0.8.5 (transitive via screencapturekit) references
          # macOS-15 SDK symbols (MTLResidencySet, MTLSamplerReductionMode,
          # MTLFXTemporalScalerDescriptor.requiresSynchronousInitialization).
          # macos-14 (Xcode 15) and macos-latest both lack them; macos-15
          # ships Xcode 16 with the Sequoia SDK.
          - { os: macos-15, name: macOS }
          - { os: ubuntu-24.04, name: Linux }
          - { os: windows-latest, name: Windows }

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Bumped 22.04 → 24.04 in M1.4: PipeWire 0.3.48 on 22.04 is older
      # than what libspa-rs 0.8 expects (struct fields like
      # spa_video_info_raw.flags don't exist there). 24.04 ships
      # PipeWire 1.0.5 with the matching SPA headers. libayatana-
      # appindicator3-dev replaces libappindicator3-dev (dropped in 24.04).
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            clang

      # apple-metal 0.8.x's Swift bridge uses APIs from the macOS 26 SDK
      # (MTLSamplerDescriptor.reductionMode, .lodBias). macos-15 defaults
      # to Xcode 16.4 which ships only the macOS 15.5 SDK. The image
      # also ships Xcode 26.x — pin it explicitly.
      - name: Select Xcode 26.3 (macOS 26 SDK)
        if: matrix.os == 'macos-15'
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (debug, no bundle)
        run: pnpm tauri build --debug --no-bundle
